name: build
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true

      - name: Build all nodes
        run: ./gradlew chiseledBuild --stacktrace

      - name: Run GameTests on all nodes
        run: ./gradlew chiseledGameTest --stacktrace

      - name: Collect jars
        run: ./gradlew chiseledBuildAndCollect --stacktrace

      - name: Upload jars
        uses: actions/upload-artifact@v5
        with:
          name: jars
          path: build/libs/*.jar
